name: foodguard
description: Track food expiry dates with smart reminders
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Storage
  sqflite: ^2.3.0
  path: ^1.9.0
  shared_preferences: ^2.2.2
  
  # Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.3
  
  # Camera & Image
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  google_mlkit_text_recognition: ^0.11.0
  
  # UI
  intl: ^0.19.0
  flutter_slidable: ^3.0.1
  lottie: ^3.0.0
  flutter_animate: ^4.5.0
  cupertino_icons: ^1.0.6
  
  # Permissions
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
